#GitHub Actions workflow for Continuous Deployment of Smart Invest application to AWS
# This workflow is triggered on pushes to the main branch. It builds the backend and frontend,
# uploads the backend JAR to S3, and deploys it to EC2 via SSM. It also syncs the frontend build to S3 and invalidates CloudFront cache.
# Note: This workflow assumes that the necessary AWS credentials and configuration are stored in GitHub Secrets.

# 这个文件是 GitHub Actions 工作流，用于将 Smart Invest 应用程序持续部署到 AWS
# 此工作流在有代码被推送到 main 分支时触发。它构建后端和前端，
# 将后端 JAR 上传到 S3，并通过 SSM 部署到 EC2。它还将前端构建同步到 S3 并使 CloudFront 缓存失效。
# 注意：此工作流假设必要的 AWS 凭证和配置存储在 GitHub Secrets 中。
# 
name: CD

on: # CD 持续集成工作 在 main 分支有代码被推送时触发
  push:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn -B clean package -DskipTests --file backend/pom.xml

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Upload JAR to S3
        run: |
          aws s3 cp backend/app/target/smart-invest-app.jar \
            s3://${{ secrets.S3_BUCKET }}/smart-invest-app.jar

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \ #
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "aws s3 cp s3://${{ secrets.ARTIFACT_BUCKET }}/smart-invest-app.jar /opt/smart-invest/app.jar",
              "sudo systemctl restart smart-invest",
              "sleep 15",
              "sudo systemctl is-active smart-invest"
            ]'

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        working-directory: frontend
        env:
          # 确保构建时能正确读取 API_BASE_URL 环境变量，API_BASE_URL 在  AWS 的 可以找到
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Sync to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://${{ secrets.FRONTEND_BUCKET }}/ --delete \ 
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp dist/index.html s3://${{ secrets.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"
